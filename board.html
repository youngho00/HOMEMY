<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Board | Hwang Youngho Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .board-section {
            padding: 120px 10%;
            min-height: 100vh;
            background: linear-gradient(180deg, #0f172a 0%, #080d1a 100%);
        }

        .board-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .board-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .board-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        .board-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Post Form */
        .post-form-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 50px;
            backdrop-filter: blur(10px);
        }

        .post-form-card h3 {
            font-size: 1.5rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .post-form-card h3 i {
            color: var(--accent-color);
        }

        .post-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .board-control {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px 15px;
            color: #fff;
            width: 100%;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .board-control:focus {
            outline: none;
            border-color: var(--accent-color);
            background: rgba(15, 23, 42, 0.8);
        }

        textarea.board-control {
            min-height: 100px;
            resize: none;
        }

        .post-submit-btn {
            background: var(--primary-color);
            color: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }

        .post-submit-btn:hover {
            background: var(--accent-color);
            transform: translateY(-2px);
        }

        /* Board List */
        .board-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .board-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .board-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(0, 168, 255, 0.3);
            transform: translateX(5px);
        }

        .board-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-right: 40px; /* 삭제 버튼과 겹치지 않도록 여백 추가 */
        }

        .board-item-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .board-item-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 15px;
        }

        .board-item-content {
            color: #ddd;
            line-height: 1.6;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .no-posts {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
            font-style: italic;
        }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
            border: 1px solid #ff4d4d33;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0;
            z-index: 10;
        }

        .board-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: #ff4d4d;
            color: #fff;
        }

        .board-item-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .action-btn.view-btn i { color: #4ade80; }
        .action-btn.edit-btn i { color: #fbbf24; }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: #161e2b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            width: 100%;
            max-width: 700px;
            padding: 50px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            animation: modalFadeIn 0.3s ease-out;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-close {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #ff4d4d;
            transform: rotate(90deg);
        }

        .modal-header {
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 20px;
        }

        .modal-title {
            font-size: 2rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: var(--accent-color);
            margin-bottom: 15px;
        }

        .modal-meta {
            display: flex;
            gap: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .modal-body {
            color: #eee;
            line-height: 1.8;
            font-size: 1.1rem;
            white-space: pre-wrap;
            max-height: 50vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        .modal-body::-webkit-scrollbar { width: 6px; }
        .modal-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        @media (max-width: 768px) {
            .board-section { padding: 100px 20px; }
            .post-grid { grid-template-columns: 1fr; }
            .board-header h2 { font-size: 2.2rem; }
            .modal-content { padding: 30px 20px; }
            .modal-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <header class="navbar scrolled">
        <div class="nav-container">
            <h1 class="nav-logo" style="cursor: pointer;" onclick="location.href='index.html'" data-i18n="logo">Hwang<span>Youngho</span></h1>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html" data-i18n="nav.home">Home</a></li>
                    <li><a href="skills.html" data-i18n="nav.skills">Skills</a></li>
                    <li><a href="project.html" data-i18n="nav.project">Project</a></li>
                    <li>
                        <a href="why-doosan.html" data-i18n="nav.whyDoosan">Why Doosan</a>
                        <div class="dropdown-content">
                            <a href="why-doosan.html#step1" data-i18n="whyDoosan.dropdown.step1">두산로보틱스</a>
                            <a href="why-doosan.html#step2" data-i18n="whyDoosan.dropdown.step2">글로벌</a>
                            <a href="why-doosan.html#step3" data-i18n="whyDoosan.dropdown.step3">나의 역할</a>
                            <a href="why-doosan.html#step4" data-i18n="whyDoosan.dropdown.step4">목표</a>
                        </div>
                    </li>
                    <li><a href="board.html" style="color: #00a8ff;" data-i18n="nav.board">자유게시판</a></li>
                    <li><a href="contact.html" data-i18n="nav.contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="board-section">
        <div class="board-container">
            <div class="board-header">
                <h2 data-i18n="board.title">자유게시판</h2>
            </div>

            <div class="board-list" id="boardList" style="margin-bottom: 80px;">
                <!-- 게시글이 여기에 렌더링됩니다 -->
            </div>

            <div class="post-form-card" id="formAnchor">
                <h3 id="formTitle"><i class="fa-solid fa-pen-to-square"></i> <span data-i18n="board.write_title">새 글 작성하기</span></h3>
                <form id="postForm">
                    <div class="post-grid">
                        <input type="text" id="postName" class="board-control" data-i18n="board.author" placeholder="작성자 이름" required>
                        <input type="email" id="postEmail" class="board-control" data-i18n="board.email_label" placeholder="이메일 (비공개)" required>
                    </div>
                    <input type="text" id="postTitle" class="board-control" data-i18n="board.title_label" placeholder="제목을 입력하세요" style="margin-bottom: 20px;" required>
                    <textarea id="postContent" class="board-control" data-i18n="board.content_label" placeholder="내용을 입력하세요" style="margin-bottom: 20px;" required></textarea>
                    <div style="display: flex; gap: 10px; justify-content: flex-end;">
                        <button type="button" id="cancelEdit" class="post-submit-btn" style="background: #334155; display: none;" data-i18n="board.cancel">취소</button>
                        <button type="submit" id="submitBtn" class="post-submit-btn">
                            <i class="fa-solid fa-check"></i> <span data-i18n="board.submit">등록하기</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- Modal for Viewing Posts -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="modal-close" id="modalClose"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-header">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-meta">
                    <span id="modalAuthor"></span>
                    <span id="modalDate"></span>
                </div>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <a href="contact.html" class="floating-request-btn reveal">
        <i class="fa-solid fa-paper-plane"></i> <span data-i18n="footer.floating">요청사항 보내기</span>
    </a>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">Hwang<span>Youngho</span></div>
            <p>&copy; 2026 Hwang Youngho. <span data-i18n="footer.rights">All rights reserved.</span></p>
            <div></div> <!-- Spacer for grid -->
        </div>
    </footer>

    <script src="translations.js"></script>
    <script src="i18n.js"></script>
    <script>
        window.addEventListener("load", function() {
            document.querySelectorAll(".reveal").forEach(el => el.classList.add("active"));
        });
    </script>
    <script>
        // 초기 데이터 로드
        let posts = JSON.parse(localStorage.getItem('hwang_portfolio_posts')) || [];
        let editIndex = -1;

        const boardList = document.getElementById('boardList');
        const postForm = document.getElementById('postForm');
        const submitBtn = document.getElementById('submitBtn');
        const cancelEdit = document.getElementById('cancelEdit');
        const formTitle = document.getElementById('formTitle');

        function renderPosts() {
            boardList.innerHTML = '';
            
            const currentLang = localStorage.getItem('portfolio_lang') || 'ko';
            const t = (translations[currentLang] && translations[currentLang].board) || translations.ko.board;

            if (posts.length === 0) {
                boardList.innerHTML = `<div class="no-posts">${t.no_posts}</div>`;
                return;
            }

            // 최신순 정렬
            const sortedPosts = [...posts].reverse();

            sortedPosts.forEach((post, index) => {
                const actualIndex = posts.length - 1 - index;
                const item = document.createElement('div');
                item.className = 'board-item';
                item.innerHTML = `
                    <button class="delete-btn" title="삭제" onclick="deletePost(${actualIndex})"><i class="fa-solid fa-trash"></i></button>
                    <div class="board-item-header">
                        <div class="board-item-title">${escapeHtml(post.title)}</div>
                        <div class="board-item-meta">
                            <span><i class="fa-solid fa-user"></i> ${escapeHtml(post.name)}</span>
                            <span><i class="fa-solid fa-calendar-days"></i> ${post.date}</span>
                        </div>
                    </div>
                    <div class="board-item-content">${escapeHtml(post.content)}</div>
                    <div class="board-item-actions">
                        <button class="action-btn view-btn" onclick="viewPost(${actualIndex})">
                            <i class="fa-solid fa-eye"></i> ${currentLang === 'ko' ? '보기' : 'View'}
                        </button>
                        <button class="action-btn edit-btn" onclick="editPost(${actualIndex})">
                            <i class="fa-solid fa-pen"></i> ${currentLang === 'ko' ? '수정' : 'Edit'}
                        </button>
                    </div>
                `;
                boardList.appendChild(item);
            });
        }

        // Add applyLanguage override to also re-render posts
        const originalApplyLanguage = window.applyLanguage;
        window.applyLanguage = function(lang) {
            if (typeof originalApplyLanguage === 'function') {
                originalApplyLanguage(lang);
            }
            renderPosts();
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        postForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const postData = {
                name: document.getElementById('postName').value,
                email: document.getElementById('postEmail').value,
                title: document.getElementById('postTitle').value,
                content: document.getElementById('postContent').value,
                date: editIndex >= 0 ? posts[editIndex].date : new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' })
            };

            const currentLang = localStorage.getItem('portfolio_lang') || 'ko';

            if (editIndex >= 0) {
                posts[editIndex] = postData;
                alert(currentLang === 'ko' ? '게시글이 수정되었습니다!' : 'Post updated!');
            } else {
                posts.push(postData);
                alert(currentLang === 'ko' ? '게시글이 등록되었습니다!' : 'Post registered!');
            }

            localStorage.setItem('hwang_portfolio_posts', JSON.stringify(posts));
            resetForm();
            renderPosts();
        });

        window.viewPost = function(index) {
            const post = posts[index];
            document.getElementById('modalTitle').textContent = post.title;
            document.getElementById('modalAuthor').innerHTML = `<i class="fa-solid fa-user"></i> ${post.name}`;
            document.getElementById('modalDate').innerHTML = `<i class="fa-solid fa-calendar-days"></i> ${post.date}`;
            document.getElementById('modalBody').textContent = post.content;
            
            const overlay = document.getElementById('modalOverlay');
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Prevent scroll
        };

        document.getElementById('modalClose').onclick = closeModal;
        document.getElementById('modalOverlay').onclick = function(e) {
            if (e.target === this) closeModal();
        };

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.editPost = function(index) {
            editIndex = index;
            const post = posts[index];
            
            document.getElementById('postName').value = post.name;
            document.getElementById('postEmail').value = post.email;
            document.getElementById('postTitle').value = post.title;
            document.getElementById('postContent').value = post.content;

            const currentLang = localStorage.getItem('portfolio_lang') || 'ko';
            formTitle.innerHTML = `<i class="fa-solid fa-pen-to-square"></i> ${currentLang === 'ko' ? '게시글 수정하기' : 'Edit Post'}`;
            submitBtn.innerHTML = `<i class="fa-solid fa-check"></i> ${currentLang === 'ko' ? '수정 완료' : 'Finish Edit'}`;
            cancelEdit.style.display = 'block';
            
            document.getElementById('formAnchor').scrollIntoView({ behavior: 'smooth' });
        };

        window.deletePost = function(index) {
            const currentLang = localStorage.getItem('portfolio_lang') || 'ko';
            if (confirm(currentLang === 'ko' ? '게시글을 삭제하시겠습니까?' : 'Do you want to delete this post?')) {
                posts.splice(index, 1);
                localStorage.setItem('hwang_portfolio_posts', JSON.stringify(posts));
                if (editIndex === index) resetForm();
                renderPosts();
            }
        };

        cancelEdit.onclick = resetForm;

        function resetForm() {
            editIndex = -1;
            postForm.reset();
            const currentLang = localStorage.getItem('portfolio_lang') || 'ko';
            formTitle.innerHTML = `<i class="fa-solid fa-pen-to-square"></i> ${currentLang === 'ko' ? '새 글 작성하기' : 'Write a New Post'}`;
            submitBtn.innerHTML = `<i class="fa-solid fa-check"></i> ${currentLang === 'ko' ? '등록하기' : 'Submit'}`;
            cancelEdit.style.display = 'none';
        }

        // 초기 렌더링
        renderPosts();
    </script>
</body>
</html>
